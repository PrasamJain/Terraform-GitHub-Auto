# ============================================================
#  .github/workflows/terraform.yml
#
#  BEGINNER GUIDE – What this pipeline does:
#  1. Triggered on every push / PR to main branch
#  2. Reads ec2_name from terraform.tfvars.json
#  3. State file path → tfstates/<ec2_name>.tfstate
#     • New name  = new state file = NEW EC2 created
#     • Same name = same state file = EXISTING EC2 updated in-place
#  4. On push to main: applies changes automatically
#  5. Commits the updated state file back to the repo
#
#  ROOT CAUSE FIX:
#    terraform apply needs BOTH flags:
#      -state=<path>      ← where to READ existing state from
#      -state-out=<path>  ← where to WRITE updated state after apply
#    Without -state-out, Terraform silently writes to ./terraform.tfstate
#    and the named state file in tfstates/ is NEVER updated.
#    Next run then reads stale state → thinks EC2 is missing → creates duplicate.
# ============================================================

name: Terraform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TF_VERSION: "1.7.0"

jobs:
  terraform:
    name: "Terraform Plan & Apply"
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit state file back to repo

    steps:

      # ── Step 1: Get the code ──────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can push commits back

      # ── Step 2: Install Terraform ─────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Step 3: Connect to AWS ────────────────────────────
      #    Add these in: GitHub repo → Settings → Secrets → Actions
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      # ── Step 4: Read ec2_name from tfvars.json ────────────
      #    ec2_name value becomes the .tfstate filename
      #    e.g.  "my-server"  →  tfstates/my-server.tfstate
      - name: Read EC2 Name & Set State Path
        id: ec2name
        run: |
          EC2_NAME=$(jq -r '.ec2_name' terraform.tfvars.json)
          STATE_PATH="tfstates/${EC2_NAME}.tfstate"
          echo "EC2 name   : $EC2_NAME"
          echo "State file : $STATE_PATH"
          echo "name=$EC2_NAME"       >> $GITHUB_OUTPUT
          echo "state_path=$STATE_PATH" >> $GITHUB_OUTPUT

      # ── Step 5: Ensure tfstates/ folder exists ────────────
      - name: Create tfstates directory if missing
        run: mkdir -p tfstates

      # ── Step 6: Terraform Init ────────────────────────────
      - name: Terraform Init
        run: terraform init

      # ── Step 7: Format Check (warns, does not fail) ───────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      # ── Step 8: Validate config syntax ────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Step 9: Terraform Plan ────────────────────────────
      #    -state      → read existing state from named file
      #                   (first run: file doesn't exist yet, that's OK)
      #    -var-file   → load all variable values from tfvars.json
      #    -out=tfplan → save the plan so Apply uses exactly this plan
      - name: Terraform Plan
        run: |
          terraform plan \
            -var-file=terraform.tfvars.json \
            -state=${{ steps.ec2name.outputs.state_path }} \
            -out=tfplan

      # ── Step 10: Terraform Apply ───────────────────────────
      #    Only runs on direct push to main (not on PRs)
      #
      #    ⚠️  KEY FIX: -state-out MUST match -state
      #    -state     → where to read current state (same as plan)
      #    -state-out → where to WRITE the updated state after apply
      #
      #    Without -state-out, Terraform writes to ./terraform.tfstate
      #    and your named state file stays stale → duplicates on next run!
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          terraform apply \
            -state=${{ steps.ec2name.outputs.state_path }} \
            -state-out=${{ steps.ec2name.outputs.state_path }} \
            -auto-approve \
            tfplan

      # ── Step 11: Commit updated state file back to repo ───
      #    The state file records what Terraform created in AWS.
      #    We save it in git so the NEXT pipeline run can read it
      #    and know the EC2 already exists (update) vs not (create).
      - name: Save State File to Repository
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest before pushing to avoid stale ref errors
          git pull --rebase origin main

          git add tfstates/

          # Only commit if the state file actually changed
          if git diff --staged --quiet; then
            echo "✅ No state changes – nothing to commit."
          else
            git commit -m "ci: update tfstate for EC2 → ${{ steps.ec2name.outputs.name }}"
            git push origin main
            echo "✅ State file committed and pushed."
          fi
